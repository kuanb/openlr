<!doctype html>

<html lang="en">
<head>
    <meta charset="utf-8">

    <title>OpenLR</title>
    <meta name="description" content="OpenLR">
    <meta name="author" content="kuanbutts">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="arrowstyle.css">
    <link
      href="https://api.tiles.mapbox.com/mapbox-gl-js/v1.8.1/mapbox-gl.css"
      rel="stylesheet"
    />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', sans-serif;
        }
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }
        #form {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 1;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #form label {
            font-family: Helvetica, Arial, sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
        }
        #form input {
            width: 280px;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        #form input:focus {
            border-color: #4a90d9;
            box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.25);
        }
        #form input::placeholder {
            color: #999;
            font-family: Helvetica, Arial, sans-serif;
            font-style: italic;
        }
        #form button {
            padding: 8px 14px;
            border: none;
            border-radius: 5px;
            background-color: #4a90d9;
            color: white;
            font-family: Helvetica, Arial, sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background-color 0.2s;
        }
        #form button:hover {
            background-color: #357abd;
        }
        #form button:active {
            background-color: #2a6099;
        }
        #mapMatchBtn {
            background-color: #2db5a0;
        }
        #mapMatchBtn:hover {
            background-color: #249e8b;
        }
        #mapMatchBtn:active {
            background-color: #1d8475;
        }
        #mapMatchBtn.loading {
            opacity: 0.6;
            cursor: wait;
        }
        #matchInfo {
            position: absolute;
            bottom: 50px;
            left: 15px;
            z-index: 1;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 10px 14px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
            font-family: Helvetica, Arial, sans-serif;
            font-size: 12px;
            color: #333;
            display: none;
            max-width: 320px;
        }
        #matchInfo .match-title {
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 4px;
            color: #2db5a0;
        }
        #matchInfo .match-row {
            margin: 2px 0;
        }
        #header {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1;
            width: 300px;
            height: 50px;
            background-image: url('https://raw.githubusercontent.com/d3/d3-scale-chromatic/master/img/cool.png');
            background-repeat: no-repeat;
            background-size: 300px 50px;
        }
        #header p {
            font-family: Helvetica, Arial, Sans-Serif;
            text-shadow: 0px 0px 4px #000;
            color: white;
            padding-left: 20px;
            padding-right: 20px;
        }
        .mapboxgl-popup {
            max-width: 200px;
        }
        .mapboxgl-popup-content {
            text-align: center;
        }
        .streetview-popup .mapboxgl-popup-content {
            padding: 8px 10px;
            font-family: Helvetica, Arial, sans-serif;
            font-size: 12px;
        }
        .streetview-popup a {
            color: #4a90d9;
            font-weight: 600;
            text-decoration: none;
        }
        .streetview-popup a:hover {
            text-decoration: underline;
        }
        .streetview-popup .sv-coords {
            color: #666;
            font-size: 11px;
            margin-top: 2px;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
        }
        #snackbar {
            visibility: hidden; /* Hidden by default. Visible on click */
            min-width: 250px;
            margin-left: -125px; /* Divide value of min-width by 2 */
            background-color: #B30000;
            color: #fff;
            text-align: center;
            border-radius: 2px;
            padding: 16px;
            position: fixed;
            left: 50%;
            bottom: 30px;
        }

        #snackbar.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.3s 1.7s;
        }

        @keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }

        @keyframes fadeout {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }

        @media (max-width: 640px) {
            #form {
                top: 10px;
                left: 10px;
                right: 10px;
            }
            #form input {
                width: 100%;
                min-width: 0;
            }
            #header {
                top: auto;
                bottom: 10px;
                right: 10px;
                left: 10px;
                width: auto;
                background-size: 100% 50px;
            }
        }
    </style>

</head>

<body>

    <div id="form" onkeypress="openLRSubmit(event)">
        <label for="openlrInput">OpenLR</label>
        <input type="text" id="openlrInput" name="openlrInput" placeholder="paste encoded string, press Enter">
        <button onclick="process()">Go</button>
        <button id="mapMatchBtn" onclick="mapMatch()">Map Match</button>
    </div>

    <div id="map"></div>
    <div id="header">
        <p style="float: left;">Start</p>
        <p style="float: right;">End</p>
    </div>

    <div id="matchInfo"></div>
    <div id='snackbar'>Failed to parse OpenLR.</div>

</body>

<script src="https://api.mapbox.com/mapbox-gl-js/v1.8.0/mapbox-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/openlr-js@3.0.6/lib/browser/bundle.min.js"></script>
<script src='https://npmcdn.com/@turf/turf/turf.min.js'></script>
<script src="https://d3js.org/d3.v5.js"></script>
<script src="config.js"></script>

<script type="text/javascript">
    mapboxgl.accessToken = MAPBOX_ACCESS_TOKEN;
    var map = new mapboxgl.Map({
        container: 'map', // container id
        style: 'mapbox://styles/mapbox/dark-v10', // stylesheet location
        center: [-74.5, 40], // starting position [lng, lat]
        zoom: 1 // starting zoom
    });
    map.dragRotate.disable();

    map.on("load", function () {
        const params = new URLSearchParams(window.location.search);
        const openLrString = params.get("id");
        if (openLrString) {
            document.getElementById('openlrInput').value = openLrString;
            process();
        }
    });

    // Example OpenLRs
    // CwNhbCU+jzPLAwD0/34zGw==
    // CwUVTSRzcRNIBQHJ/9MUfAAA
    // CxRySyt/9SujAAA/AB4rFA==
    // C/8G3CcQkht4FPrF/kAbbgv9G/66G2MbAA==
    // Cwc2vSIg/gEGAwDWAEIBdUUA (has a negative and positive offset)

    function openLRSubmit(event) {
        if (event.key == "Enter") {
            process();
        }
    }

    function process() {
        try {
            const binaryDecoder = new OpenLR.BinaryDecoder();

            const openLrString = document.getElementById('openlrInput').value;
            console.log(`parsing openlr=${openLrString}`);
            const openLrBinary = OpenLR.Buffer.from(openLrString, 'base64');
            const locationReference = OpenLR.LocationReference.fromIdAndBuffer('binary', openLrBinary);
            const rawLocationReference = binaryDecoder.decodeData(locationReference);
            const jsonObject = OpenLR.Serializer.serialize(rawLocationReference);

            // estimate total OpenLR length
            const segmentDistances = jsonObject.properties._points.properties.map(p => p.properties._distanceToNext)
            const totalPathLength = segmentDistances.reduce((part_sum, a) => part_sum + a, 0);

            const coordsAndBearings = jsonObject.properties._points.properties.map(
                x => [x.properties._longitude, x.properties._latitude, x.properties._bearing]);
            const coords = coordsAndBearings.map(cab => [cab[0], cab[1]]);

            const line = turf.lineString(coords);
            const lineLength = turf.length(line, {units: 'meters'});

            // Create subdivided coordinates while preserving original points
            const subdividedCoords = createSubdividedCoordsWithPreservedPoints(line, coords, lineLength);

            const coordPairs = [];
            for (let i = 0; i < subdividedCoords.length - 1; i++) {
                coordPairs.push([
                    subdividedCoords[i],
                    subdividedCoords[i + 1]
                ]);
            }

            const geojson = {
                'type': 'FeatureCollection',
                'features': coordPairs.map((cp, i) => {
                    return {
                        'type': 'Feature',
                        'properties': {
                            'color': d3.interpolateCool(i / (subdividedCoords.length - 1)),
                        },
                        'geometry': {
                            'type': 'LineString',
                            'coordinates': cp,
                        },
                    }
                }),
            }

            if (map.getLayer("route")) {
                map.removeLayer("route");
            }

            if (map.getSource("route")) {
                map.removeSource("route");
            }

            map.addSource('route', {
                'type': 'geojson',
                'data': geojson,
                'buffer': 512,
            });
            map.addLayer({
                'id': 'route',
                'type': 'line',
                'source': 'route',
                'layout': {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                'paint': {
                    'line-color': ['get', 'color'],
                    'line-width': 8
                }
            });

            attachStreetViewHover();

            // remove markers from map if any exist
            [...Array(360).keys()].map(i => {
                const elements = document.getElementsByClassName(`arrowmarker${i}`);
                if (elements.length) {
                    for (let i = 0; i < elements.length; i++) {
                        elements[i].remove();
                    }
                }
            })

            // add markers to map
            coordsAndBearings.forEach((cab, cabI) => {
                const markerLoc = [cab[0], cab[1]];
                const bearingRaw = cab[2];
                const bearing = Math.round(bearingRaw);

                const el = document.createElement('div');
                el.className = `arrowmarker${bearing}`;

                // make a marker for each feature and add to the map
                new mapboxgl.Marker(el)
                    .setLngLat(markerLoc)
                    .setPopup(
                        new mapboxgl.Popup({ offset: 25 })
                            .setHTML(`<h3>LRP #${cabI + 1} Bearing:</h3><p>${bearingRaw}</p>`)
                    )
                    .addTo(map);
            });

            // add some offset circles if we got em
            try {
                const offsets = jsonObject.properties._offsets;
                const noff = offsets.properties._nOffRelative;

                if (map.getLayer('noff_circle')) map.removeLayer('noff_circle');
                if (map.getSource('noff_circle')) map.removeSource('noff_circle');

                if (noff) {
                    const lastTwoCoords = [coords[-2], coords[-1]]
                    const lastSegLine = turf.lineString([coords[coords.length - 2], coords[coords.length - 1]]);
                    const lastSegLineLength = turf.length(lastSegLine, {units: 'meters'});

                    const noffPoint = turf.along(lastSegLine, (1 - (noff / 100)) * lastSegLineLength, {units: 'meters'});

                    map.addSource('noff_circle', {
                        'type': 'geojson',
                        'data': noffPoint,
                    });
                    map.addLayer({
                        'id': 'noff_circle',
                        'type': 'symbol',
                        'source': 'noff_circle',
                        'layout': {
                            'text-field': 'x\nnegative offset',
                            'text-size': 18,
                            'text-anchor': 'top'
                        },
                        'paint': {
                            'text-color': '#ffffff'
                        }
                    });
                }

                const poff = offsets.properties._pOffRelative;

                if (map.getLayer('poff_circle')) map.removeLayer('poff_circle');
                if (map.getSource('poff_circle')) map.removeSource('poff_circle');

                if (poff) {
                    const firstSegLine = turf.lineString([coords[0], coords[1]]);
                    const firstSegLineLength = turf.length(firstSegLine, {units: 'meters'});

                    const poffPoint = turf.along(firstSegLine, (poff / 100) * firstSegLineLength, {units: 'meters'});

                    map.addSource('poff_circle', {
                        'type': 'geojson',
                        'data': poffPoint,
                    });
                    map.addLayer({
                        'id': 'poff_circle',
                        'type': 'symbol',
                        'source': 'poff_circle',
                        'layout': {
                            'text-field': 'x\npositive offset',
                            'text-size': 18,
                            'text-anchor': 'top'
                        },
                        'paint': {
                            'text-color': '#ffffff'
                        }
                    });
                }

            } catch (err) {
                console.log(err)
            } 

            const bounds = coords.reduce((bounds, coord) => {
                return bounds.extend(coord);
            }, new mapboxgl.LngLatBounds(coords[0], coords[0]));

            updateURL(openLrString);
            map.fitBounds(bounds, { duration: 0, padding: 100 });

        } catch(error) {
            console.log(error);
            showSnackbar();
        }
    }

    function createSubdividedCoordsWithPreservedPoints(line, originalCoords, lineLength) {
        const targetSubSegments = 200;
        let subSegmentLength = Math.round(lineLength / targetSubSegments * 100) / 100;

        // don't allow subsection lengths under a meter
        if (lineLength < targetSubSegments) {
            subSegmentLength = 1;
        }

        // Calculate distances of original coordinates along the line
        const originalCoordsWithDistances = [];
        let cumulativeDistance = 0;
        
        originalCoordsWithDistances.push({
            coord: originalCoords[0],
            distance: 0
        });

        for (let i = 1; i < originalCoords.length; i++) {
            const segmentLine = turf.lineString([originalCoords[i-1], originalCoords[i]]);
            const segmentLength = turf.length(segmentLine, {units: 'meters'});
            cumulativeDistance += segmentLength;
            
            originalCoordsWithDistances.push({
                coord: originalCoords[i],
                distance: cumulativeDistance
            });
        }

        // Create all potential subdivision points
        const allPoints = new Map(); // Use Map to avoid duplicates by distance key

        // Add original coordinates
        originalCoordsWithDistances.forEach(item => {
            const key = Math.round(item.distance * 1000) / 1000; // Round to mm precision
            allPoints.set(key, {
                coord: item.coord,
                distance: item.distance,
                isOriginal: true
            });
        });

        // Add evenly spaced points
        const totalSegments = Math.min(targetSubSegments, Math.floor(lineLength / subSegmentLength));
        for (let i = 0; i <= totalSegments; i++) {
            const distance = i * subSegmentLength;
            const key = Math.round(distance * 1000) / 1000; // Round to mm precision
            
            if (!allPoints.has(key)) {
                const point = turf.along(line, distance, {units: 'meters'});
                allPoints.set(key, {
                    coord: point.geometry.coordinates,
                    distance: distance,
                    isOriginal: false
                });
            }
        }

        // Sort by distance and extract coordinates
        const sortedPoints = Array.from(allPoints.values())
            .sort((a, b) => a.distance - b.distance);

        return sortedPoints.map(point => point.coord);
    }

    let streetViewPopup = null;
    let streetViewCloseTimer = null;
    let streetViewHoverAttached = false;

    function attachStreetViewHover() {
        if (streetViewHoverAttached) return;
        streetViewHoverAttached = true;

        const cancelClose = () => {
            if (streetViewCloseTimer) {
                clearTimeout(streetViewCloseTimer);
                streetViewCloseTimer = null;
            }
        };

        const scheduleClose = () => {
            cancelClose();
            streetViewCloseTimer = setTimeout(() => {
                if (streetViewPopup) {
                    streetViewPopup.remove();
                    streetViewPopup = null;
                }
            }, 250);
        };

        map.on('mouseenter', 'route', () => {
            map.getCanvas().style.cursor = 'pointer';
        });

        map.on('mousemove', 'route', (e) => {
            cancelClose();
            const lng = e.lngLat.lng;
            const lat = e.lngLat.lat;
            const svUrl = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${lat},${lng}`;
            const html = `
                <div>
                    <a href="${svUrl}" target="_blank" rel="noopener noreferrer">Open in Street View ↗</a>
                    <div class="sv-coords">${lat.toFixed(6)}, ${lng.toFixed(6)}</div>
                </div>
            `;

            if (!streetViewPopup) {
                streetViewPopup = new mapboxgl.Popup({
                    closeButton: false,
                    closeOnClick: false,
                    offset: 12,
                    className: 'streetview-popup',
                })
                    .setLngLat(e.lngLat)
                    .setHTML(html)
                    .addTo(map);

                const popupEl = streetViewPopup.getElement();
                if (popupEl) {
                    popupEl.addEventListener('mouseenter', cancelClose);
                    popupEl.addEventListener('mouseleave', scheduleClose);
                }
            } else {
                streetViewPopup.setLngLat(e.lngLat).setHTML(html);
            }
        });

        map.on('mouseleave', 'route', () => {
            map.getCanvas().style.cursor = '';
            scheduleClose();
        });
    }

    function clearMatchLayer() {
        if (map.getLayer('matchRoute')) map.removeLayer('matchRoute');
        if (map.getSource('matchRoute')) map.removeSource('matchRoute');
        document.getElementById('matchInfo').style.display = 'none';
    }

    async function mapMatch() {
        const openLrString = document.getElementById('openlrInput').value.trim();
        if (!openLrString) {
            showSnackbar('No OpenLR string provided.');
            return;
        }

        const btn = document.getElementById('mapMatchBtn');
        btn.classList.add('loading');
        btn.disabled = true;

        try {
            const encodedOlr = encodeURIComponent(openLrString);
            const url = `https://api.mapbox.com/matching/v5/mapbox/driving/${encodedOlr}.json`
                + `?openlr_spec=tomtom&openlr_format=tomtom`
                + `&geometries=geojson&overview=full`
                + `&access_token=${mapboxgl.accessToken}`;

            const response = await fetch(url);
            const data = await response.json();

            if (data.code !== 'Ok' || !data.matchings || data.matchings.length === 0) {
                showSnackbar(data.message || `Map matching failed: ${data.code}`);
                return;
            }

            const matching = data.matchings[0];
            const geojson = {
                'type': 'Feature',
                'geometry': matching.geometry,
                'properties': {}
            };

            clearMatchLayer();

            map.addSource('matchRoute', {
                'type': 'geojson',
                'data': geojson,
            });
            map.addLayer({
                'id': 'matchRoute',
                'type': 'line',
                'source': 'matchRoute',
                'layout': {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                'paint': {
                    'line-color': '#2db5a0',
                    'line-width': 5,
                    'line-opacity': 0.85,
                    'line-dasharray': [2, 2]
                }
            });

            const coords = matching.geometry.coordinates;
            const bounds = coords.reduce((b, coord) => {
                return b.extend(coord);
            }, new mapboxgl.LngLatBounds(coords[0], coords[0]));
            map.fitBounds(bounds, { duration: 0, padding: 100 });

            const infoEl = document.getElementById('matchInfo');
            infoEl.innerHTML = `
                <div class="match-title">Map Match Result</div>
                <div class="match-row"><strong>Confidence:</strong> ${(matching.confidence * 100).toFixed(1)}%</div>
                <div class="match-row"><strong>Distance:</strong> ${(matching.distance).toFixed(1)} m</div>
                <div class="match-row"><strong>Duration:</strong> ${(matching.duration).toFixed(1)} s</div>
            `;
            infoEl.style.display = 'block';

        } catch (err) {
            console.error(err);
            showSnackbar('Map matching request failed.');
        } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    }

    function updateURL(olrString) {
        const params = new URLSearchParams(window.location.search);
        let path = window.location.pathname;
        if (path.charAt(path.length - 1) !== "/") {
            path += "/";
        }

        const encodedValue = encodeURIComponent(olrString);
        let paramsString = `${path}?id=${encodedValue}`;
        window.history.pushState({}, "new-openlr-update", paramsString);
    }

    function showSnackbar(msg) {
        var x = document.getElementById('snackbar');
        if (msg) x.textContent = msg;
        else x.textContent = 'Failed to parse OpenLR.';
        x.className = 'show';
        setTimeout(function(){ x.className = x.className.replace('show', ''); }, 2000);
    }
</script>

</html>
